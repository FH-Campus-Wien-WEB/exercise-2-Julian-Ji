<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies!</title>
  <style>
      /* Part 3: Your styling goes here */
      body {
          font-family: 'Trebuchet MS', sans-serif;
          background-color: #f4f4f9;
          padding: 40px;
          color: #333;
      }

      h1 {
          text-align: center;
          font-weight: bold;
          color: #2c3e50;
          margin-bottom: 40px;
      }

      article {
          background-color: #ffffff;
          border-radius: 15px;
          margin: 20px auto;
          padding: 20px;
          max-width: 800px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
          display: flex;
          gap: 20px;
          transition: transform 0.2s;
      }

      article:hover {
          transform: scale(1.02);
      }

      img {
          max-width: 150px;
          height: auto;
          border-radius: 10px;
          box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      }

      .movie-content {
          flex: 1;
      }

      h2 {
          margin-top: 0;
          color: #e67e22;
      }

      ul {
          list-style: none;
          padding: 0;
      }

      li {
          margin-bottom: 10px;
      }

  </style>
  <script>
      function reverseString(s) {
          return s.split("").reverse().join("");
      }

      window.onload = function () {
          const xhr = new XMLHttpRequest()
          xhr.onload = function () {
              const bodyElement = document.querySelector("body")
              if (xhr.status == 200) {
		          /* Part 2: Build the HTML elements here and append them to the body */ 
                  const movies = JSON.parse(xhr.responseText);
                  bodyElement.innerHTML = "<h1>My Movie Collection</h1>";

                  movies.forEach(movie => {
                      const movieArticle = document.createElement("article");

                      movieArticle.innerHTML = `
                          <h2>${movie.Title}</h2>
                          <img src="${movie.Poster}" alt="${movie.Title}">
                          <p>${movie.Plot}</p>
                          <ul>
                              <li><strong>Released:</strong> ${movie.Released}</li>
                              <li><strong>Runtime:</strong> ${movie.Runtime} min</li>
                              <li><strong>Genres:</strong> ${movie.Genres.join(", ")}</li>
                              <li><strong>Directors:</strong> ${movie.Directors.join(", ")}</li>
                              <li><strong>Actors:</strong> ${movie.Actors.join(", ")}</li>
                              <li><strong>IMDb Rating:</strong> ${movie.imdbRating}</li>
                          </ul>
                      `;

                      bodyElement.appendChild(movieArticle);
                  });
              } else {
                  bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
              }
          }
          xhr.open("GET", "/movies")
          xhr.send()
      }
  </script>
  
</head>

<body>
</body>

</html>
